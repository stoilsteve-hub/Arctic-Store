<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<button class="popupButton"> Show Popup</button>

<div class="popup">
    <div class="popupContent">
        <h1>Billing Form</h1>
        <form action="/action_page.php">
            <label for="name">Full name:</label>
            <input type="text" id="name" name="name"><br><br>
            <label for="mail">Mail:</label>
            <input type="text" id="mail" name="mail"><br><br>
            <label for="phone">Phone number:</label>
            <input type="text" id="phone" name="phone"><br><br>
            <label for="address">Address:</label>
            <input type="text" id="address" name="address"><br><br>
            <label for="postalnr">Postal number:</label>
            <input type="text" id="postalnr" name="postalnr"><br><br>
            <label for="county">County:</label>
            <input type="text" id="county" name="county"><br><br>
        </form>
        <button class="closeButton">OK</button>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
